<!DOCTYPE html>
<html>

<head>
<title>Dashboard – The Coolest Smart Home App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div id="phone-container">
  <img id="phone-frame" src="Phone_html_layout.png" alt="Phone Frame">
  <div id="wrapper">

    <h2 class="welcome-message" id="welcomeMessage">Welcome Back, User</h2>

    <div class="top-row">
      
      <div style="align-items: center; align-content: center;" class="placeholder-image" id="mainImage">
        <img src="Room_Layout.png" alt="" style="width:100%;height:100%; "> 
      </div>

      <div>
        <!-- more pop ups-->
        <button class="profile-button" id="profileButton" onclick="toggleAllowances()">
          <img src="GretaPopup.png" alt="Profilbild" id="profilePicSmall">
        </button>

        <!-- Allowances Popup -->
        <div class="allowances-popup" id="allowancesPopup">
          <h3>Allowances</h3>
          <label><input type="checkbox" name="allowance" value="lights" checked> Lichter steuern</label>
          <label><input type="checkbox" name="allowance" value="thermostat" checked> Thermostat steuern</label>
          <button style = 'color: white;' type="button" class="btn cancel collapse-button" onclick="toggleAllowances()">Back</button>
        </div>
      </div>
    </div>

    <!-- config devices (except no s cuz I was too lazy to add more than one) -->
    <div class="devices-section">
      <h3>Your Devices</h3>

      <!-- Lamp-->
      <div class="device-card" onclick="toggleDevice('lampConfig')">
        <span class="device-name">  Lampe</span>
        <div class="device-config" id="lampConfig">
          <div class="lamp-control">
            <label><input type="checkbox" id="lampOn" checked> An</label>
            <!-- Lampe -->
<label style="color: pink;">Helligkeit:
  <input type="range" id="lampBrightness" min="0" max="100" value="70" step="25" list="brightnessTicks">
  <datalist id="brightnessTicks">
      <option value="0"></option>
      <option value="25"></option>
      <option value="50"></option>
      <option value="75"></option>
      <option value="100"></option>
  </datalist>
  <div class="scale-labels">
      <span>0</span><span>25</span><span>50</span><span>75</span><span>100</span>
  </div>
</label>
          </div>
        </div>
      </div>

      <!-- Thermostat -->
      <div class="device-card" onclick="toggleDevice('thermostatConfig')">
        <span class="device-name";>Thermostat</span>
        <div class="device-config" id="thermostatConfig">
          <div class="temp-control">
            <button type="button" onclick="event.stopPropagation(); changeTemp(-1)">−</button>
            <span class="temp-value" id="tempValue" style="color: pink;">21°C</span>
            <button type="button" onclick="event.stopPropagation(); changeTemp(1)">+</button>
          </div>
        </div>
      </div>

      <div class="device-card" onclick="toggleDevice('soundbarConfig')" id="soundbarCard" style="display: none;">
        <span class="device-name">JBL Soundbar</span>
        <div class="device-config" id="soundbarConfig">

            <div class="now-playing" style="text-align: center; margin-bottom: 10px;">
                <p  style=" color: rgb(249, 205, 212);" id="songTitle" style="margin: 0; font-weight: bold;">Blinding Lights</p>
                <p id="songArtist" style="margin: 0; font-size: 1.5em; color: white; background-color: pink; border-radius: 10px;">The Weeknd</p>
            </div>

            <!-- Progress Bar Song -->
<div class="progress-control" style="margin-bottom: 10px;">
  <input type="range" id="songProgress" min="0" max="100" value="30" step="25" list="progressTicks"
         onclick="event.stopPropagation()" oninput="event.stopPropagation()">
  <datalist id="progressTicks">
      <option value="0"></option>
      <option value="25"></option>
      <option value="50"></option>
      <option value="75"></option>
      <option value="100"></option>
  </datalist>
</div>

            <div class="player-controls" style="display: flex; justify-content: center; gap: 15px; margin-bottom: 10px;">
                <button class="btn" type="button" onclick="event.stopPropagation(); prevSong()">⏮</button>
                <button class="btn"   type="button" id="playPauseBtn" onclick="event.stopPropagation(); togglePlay()">⏸</button>
                <button class="btn" type="button" onclick="event.stopPropagation(); nextSong()">⏭</button>
            </div>

            <!-- Soundbar Vol -->
<label>Volume:
  <input type="range" id="soundbarVolume" min="0" max="100" value="50" step="25" list="volumeTicks"
         onclick="event.stopPropagation()" oninput="event.stopPropagation()">
  <datalist id="volumeTicks">
      <option value="0"></option>
      <option value="25"></option>
      <option value="50"></option>
      <option value="75"></option>
      <option value="100"></option>
  </datalist>
  <div class="scale-labels">
      <span>0</span><span>25</span><span>50</span><span>75</span><span>100</span>
  </div>
</label>

        </div><!-- soundbarConfig -->
      </div><!-- soundbarCard -->

    </div><!-- devices-section closing tag-->

    <!-- hyperlinks -->
    <div class="dashboard-links">
      <a href="devices.html"><h2 class="hover">add new device</h2></a>
      <a href="members.html"><h2 class="hover">view household members</h2></a>
      <a href="schedule.html"><h2 class="hover">view schedule</h2></a>
    </div>

  </div><!-- wrapper closing tag -->
</div>
</body>

<script>

const params = new URLSearchParams(window.location.search);
const userName = params.get("name") || "User";
document.getElementById("welcomeMessage").textContent = "Welcome Back, " + userName;

function toggleAllowances() {
  const popup = document.getElementById("allowancesPopup");
  popup.style.display = (popup.style.display === "block") ? "none" : "block";
}

function toggleDevice(configId) {
  const config = document.getElementById(configId);
  if (config) {
    const isVisible = config.style.display === "block";
 
    document.querySelectorAll(".device-config").forEach((el) => {
      el.style.display = "none";
    });

    config.style.display = isVisible ? "none" : "block";
  }
}

let temperature = 21;
function changeTemp(delta) {
  temperature += delta;
  document.getElementById("tempValue").textContent = temperature + "°C";
}



let dv = document.referrer;
if (dv == 'devices.html') {
    checkSoundbarAdded();
}

function checkSoundbarAdded() {
    const alreadyAdded = localStorage.getItem('JBLAdded') === 'true';
    if (alreadyAdded) {
        document.getElementById('soundbarCard').style.display = 'block';
    }
}
</script>
</html>
