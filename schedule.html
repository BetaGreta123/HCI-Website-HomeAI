<!DOCTYPE html>
<html>
    <head>
        <title>schedule View</title>
        <link rel="stylesheet" href="schedule.css">
        <link rel="stylesheet" href="style.css">
        <style>
            .event-edit-input {
                font: inherit;
                color: inherit;
                border: 1px solid #ccc;
                border-radius: 3px;
                padding: 1px 4px;
                width: 70%;
            }
            .event span {
                cursor: pointer;
            }
            .event span:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
      <div id="phone-container" style="overflow: scroll;">
        <img id="phone-frame" src="Phone_html_layout.png" alt="Phone Frame">
        <div id="wrapper" style="overflow: scroll;">
      
            <a href="dashboard.html"><img src="HomeButton.png" alt="Home Button"></a><
            <div id="calendar"></div>
           <script src="//cdnjs.cloudflare.com/ajax/libs/moment.js/2.5.1/moment.min.js"></script>

        </div>
      </div>
    </body>

    <script>

    !function() {

        var today = moment();
      
        function Calendar(selector, events) {
          this.el = document.querySelector(selector);
          this.events = events;
          this.current = moment().date(1);
          this.draw();
          var current = document.querySelector('.today');
          if(current) {
            var self = this;
            window.setTimeout(function() {
              self.openDay(current);
            }, 500);
          }
        }
      
        Calendar.prototype.draw = function() {
          this.drawHeader();
          this.drawMonth();
          this.drawLegend();
        }
      
        Calendar.prototype.drawHeader = function() {
          var self = this;
          if(!this.header) {
            this.header = createElement('div', 'header');
            this.header.className = 'header';
      
            this.title = createElement('h1');
      
            var right = createElement('div', 'right');
            right.addEventListener('click', function() { self.nextMonth(); });
      
            var left = createElement('div', 'left');
            left.addEventListener('click', function() { self.prevMonth(); });
      
            this.header.appendChild(this.title); 
            this.header.appendChild(right);
            this.header.appendChild(left);
            this.el.appendChild(this.header);
          }
      
          this.title.innerHTML = this.current.format('MMMM YYYY');
        }
      
        Calendar.prototype.drawMonth = function() {
          var self = this;
          
          // Only assign a random day once per event (so an edited entry keeps its day)
          this.events.forEach(function(ev) {
            if(!ev.date) {
              ev.date = self.current.clone().date(Math.random() * (29 - 1) + 1);
            }
          });
          
          if(this.month) {
            this.oldMonth = this.month;
            this.oldMonth.className = 'month out ' + (self.next ? 'next' : 'prev');
            this.oldMonth.addEventListener('webkitAnimationEnd', function() {
              self.oldMonth.parentNode.removeChild(self.oldMonth);
              self.month = createElement('div', 'month');
              self.backFill();
              self.currentMonth();
              self.fowardFill();
              self.el.appendChild(self.month);
              window.setTimeout(function() {
                self.month.className = 'month in ' + (self.next ? 'next' : 'prev');
              }, 16);
            });
          } else {
              this.month = createElement('div', 'month');
              this.el.appendChild(this.month);
              this.backFill();
              this.currentMonth();
              this.fowardFill();
              this.month.className = 'month new';
          }
        }
      
        Calendar.prototype.backFill = function() {
          var clone = this.current.clone();
          var dayOfWeek = clone.day();
      
          if(!dayOfWeek) { return; }
      
          clone.subtract('days', dayOfWeek+1);
      
          for(var i = dayOfWeek; i > 0 ; i--) {
            this.drawDay(clone.add('days', 1));
          }
        }
      
        Calendar.prototype.fowardFill = function() {
          var clone = this.current.clone().add('months', 1).subtract('days', 1);
          var dayOfWeek = clone.day();
      
          if(dayOfWeek === 6) { return; }
      
          for(var i = dayOfWeek; i < 6 ; i++) {
            this.drawDay(clone.add('days', 1));
          }
        }
      
        Calendar.prototype.currentMonth = function() {
          var clone = this.current.clone();
      
          while(clone.month() === this.current.month()) {
            this.drawDay(clone);
            clone.add('days', 1);
          }
        }
      
        Calendar.prototype.getWeek = function(day) {
          if(!this.week || day.day() === 0) {
            this.week = createElement('div', 'week');
            this.month.appendChild(this.week);
          }
        }
      
        Calendar.prototype.drawDay = function(day) {
          var self = this;
          this.getWeek(day);
      
          var outer = createElement('div', this.getDayClass(day));
          outer.addEventListener('click', function() {
            self.openDay(this);
          });
      
          var name = createElement('div', 'day-name', day.format('ddd'));
          var number = createElement('div', 'day-number', day.format('DD'));
      
          var events = createElement('div', 'day-events');
          this.drawEvents(day, events);
      
          outer.appendChild(name);
          outer.appendChild(number);
          outer.appendChild(events);
          this.week.appendChild(outer);
        }
      
        Calendar.prototype.drawEvents = function(day, element) {
          if(day.month() === this.current.month()) {
            var todaysEvents = this.events.reduce(function(memo, ev) {
              if(ev.date.isSame(day, 'day')) {
                memo.push(ev);
              }
              return memo;
            }, []);
      
            todaysEvents.forEach(function(ev) {
              var evSpan = createElement('span', ev.color);
              element.appendChild(evSpan);
            });
          }
        }
      
        Calendar.prototype.getDayClass = function(day) {
          classes = ['day'];
          if(day.month() !== this.current.month()) {
            classes.push('other');
          } else if (today.isSame(day, 'day')) {
            classes.push('today');
          }
          return classes.join(' ');
        }
      
        Calendar.prototype.openDay = function(el) {
          var details, arrow;
          var dayNumber = +el.querySelectorAll('.day-number')[0].innerText || +el.querySelectorAll('.day-number')[0].textContent;
          var day = this.current.clone().date(dayNumber);
      
          var currentOpened = document.querySelector('.details');
      
          if(currentOpened && currentOpened.parentNode === el.parentNode) {
            details = currentOpened;
            arrow = document.querySelector('.arrow');
          } else {
            if(currentOpened) {
              currentOpened.addEventListener('webkitAnimationEnd', function() {
                currentOpened.parentNode.removeChild(currentOpened);
              });
              currentOpened.addEventListener('oanimationend', function() {
                currentOpened.parentNode.removeChild(currentOpened);
              });
              currentOpened.addEventListener('msAnimationEnd', function() {
                currentOpened.parentNode.removeChild(currentOpened);
              });
              currentOpened.addEventListener('animationend', function() {
                currentOpened.parentNode.removeChild(currentOpened);
              });
              currentOpened.className = 'details out';
            }
      
            details = createElement('div', 'details in');
            var arrow = createElement('div', 'arrow');
            details.appendChild(arrow);
            el.parentNode.appendChild(details);
          }
      
          var todaysEvents = this.events.reduce(function(memo, ev) {
            if(ev.date.isSame(day, 'day')) {
              memo.push(ev);
            }
            return memo;
          }, []);
      
          this.renderEvents(todaysEvents, details, day);
      
          arrow.style.left = el.offsetLeft - el.parentNode.offsetLeft + 27 + 'px';
        }
      
        // Builds the display text for an event: name plus its active time span
        Calendar.prototype.formatEventLabel = function(ev) {
          if(ev.start && ev.end) {
            return ev.eventName + ' (' + ev.start + ' – ' + ev.end + ')';
          }
          return ev.eventName;
        }
      
        Calendar.prototype.renderEvents = function(events, ele, day) {
          var self = this;
          var currentWrapper = ele.querySelector('.events');
          var wrapper = createElement('div', 'events in' + (currentWrapper ? ' new' : ''));
      
          events.forEach(function(ev) {
            var div = createElement('div', 'event');
            var square = createElement('div', 'event-category ' + ev.color);
            var span = createElement('span', '', self.formatEventLabel(ev));
      
            span.addEventListener('click', function() {
              var input = document.createElement('input');
              input.type = 'text';
              input.className = 'event-edit-input';
              input.value = ev.eventName;
      
              div.replaceChild(input, span);
              input.focus();
              input.select();
      
              var saved = false;
              function commit() {
                if(saved) { return; }
                saved = true;
                var newVal = input.value.trim();
                if(newVal.length) {
                  ev.eventName = newVal;
                }
                span.textContent = self.formatEventLabel(ev);
                if(input.parentNode === div) {
                  div.replaceChild(span, input);
                }
              }
      
              input.addEventListener('blur', commit);
              input.addEventListener('keydown', function(e) {
                if(e.key === 'Enter') {
                  input.blur();
                } else if(e.key === 'Escape') {
                  input.value = ev.eventName;
                  input.blur();
                }
              });
            });
      
            div.appendChild(square);
            div.appendChild(span);
            wrapper.appendChild(div);
          });
      
          if(!events.length) {
            var div = createElement('div', 'event empty');
            var span = createElement('span', '', 'No Events');
      
            // Clicking "No Events" lets you create a new entry for this day
            span.addEventListener('click', function() {
              var input = document.createElement('input');
              input.type = 'text';
              input.className = 'event-edit-input';
              input.value = '';
              input.placeholder = 'Neuer Eintrag…';
      
              div.replaceChild(input, span);
              input.focus();
      
              var saved = false;
              function commit() {
                if(saved) { return; }
                saved = true;
                var newVal = input.value.trim();
                if(newVal.length) {
                  var newEvent = {
                    eventName: newVal,
                    start: '',
                    end: '',
                    calendar: 'Sonstiges',
                    color: 'green',
                    date: day.clone()
                  };
                  self.events.push(newEvent);
                  self.drawLegend();
      
                  var dayEvents = self.events.reduce(function(memo, e) {
                    if(e.date.isSame(day, 'day')) { memo.push(e); }
                    return memo;
                  }, []);
                  self.renderEvents(dayEvents, ele, day);
                } else if(input.parentNode === div) {
                  div.replaceChild(span, input);
                }
              }
      
              input.addEventListener('blur', commit);
              input.addEventListener('keydown', function(e) {
                if(e.key === 'Enter') {
                  input.blur();
                } else if(e.key === 'Escape') {
                  input.value = '';
                  input.blur();
                }
              });
            });
      
            div.appendChild(span);
            wrapper.appendChild(div);
          }
      
          if(currentWrapper) {
            currentWrapper.className = 'events out';
            currentWrapper.addEventListener('webkitAnimationEnd', function() {
              currentWrapper.parentNode.removeChild(currentWrapper);
              ele.appendChild(wrapper);
            });
            currentWrapper.addEventListener('oanimationend', function() {
              currentWrapper.parentNode.removeChild(currentWrapper);
              ele.appendChild(wrapper);
            });
            currentWrapper.addEventListener('msAnimationEnd', function() {
              currentWrapper.parentNode.removeChild(currentWrapper);
              ele.appendChild(wrapper);
            });
            currentWrapper.addEventListener('animationend', function() {
              currentWrapper.parentNode.removeChild(currentWrapper);
              ele.appendChild(wrapper);
            });
          } else {
            ele.appendChild(wrapper);
          }
        }
      
        // Dedupes by calendar name only, keeps the first color seen for that name
        Calendar.prototype.drawLegend = function() {
          var self = this;
          if(!this.legend) {
            this.legend = createElement('div', 'legend');
            this.el.appendChild(this.legend);
          } else {
            this.legend.innerHTML = '';
          }
      
          var seen = [];
          this.events.forEach(function(e) {
            if(seen.indexOf(e.calendar) === -1) {
              seen.push(e.calendar);
              var entry = createElement('span', 'entry ' + e.color, e.calendar);
              self.legend.appendChild(entry);
            }
          });
        }
      
        Calendar.prototype.nextMonth = function() {
          this.current.add('months', 1);
          this.next = true;
          this.draw();
        }
      
        Calendar.prototype.prevMonth = function() {
          this.current.subtract('months', 1);
          this.next = false;
          this.draw();
        }
      
        window.Calendar = Calendar;
      
        function createElement(tagName, className, innerText) {
          var ele = document.createElement(tagName);
          if(className) {
            ele.className = className;
          }
          if(innerText) {
            ele.innderText = ele.textContent = innerText;
          }
          return ele;
        }
      }();
      
      !function() {
        var data = [
          { eventName: 'Living Room Lampe', start: '08:00', end: '22:00', calendar: 'Licht', color: 'orange' },
          { eventName: 'Floor Lamp', start: '18:00', end: '23:00', calendar: 'Licht', color: 'orange' },
          { eventName: 'Kitchen Lights small', start: '06:30', end: '09:00', calendar: 'Licht', color: 'orange' },
      
          { eventName: 'Heizung Wohnzimmer 20°C', start: '02:30', end: '08:00', calendar: 'Thermostat', color: 'blue' },
          { eventName: 'Thermostate Bedroom 18°C', start: '22:00', end: '06:00', calendar: 'Thermostat', color: 'blue' },
          { eventName: 'Thermostate Bathroom 21°C', start: '06:00', end: '07:30', calendar: 'Thermostat', color: 'blue' },
      
          { eventName: 'Holiday Mode: Lights turned off', start: '00:00', end: '23:59', calendar: 'Licht', color: 'yellow' },
          { eventName: 'Thermostat Eco-Modus', start: '09:00', end: '17:00', calendar: 'Thermostat', color: 'yellow' },
      
          { eventName: 'Outside Lighting', start: '20:00', end: '06:00', calendar: 'Licht', color: 'green' },
          { eventName: 'Gardening Thermostate', start: '06:00', end: '06:30', calendar: 'Thermostat', color: 'green' }
        ];
      
        var calendar = new Calendar('#calendar', data);
      
      }();
      
    </script>
</html>
