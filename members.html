<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
<div id="phone-container">
  <img id="phone-frame" src="Phone_html_layout.png" alt="Phone Frame">
  <div id="wrapper">

    <a href="dashboard.html"><img src="HomeButton.png" alt="Go to Dashboard" class="HomeButton"></a>
    <div>
        <h1 style="background-color: pink; border-radius: 1cm;">Members</h1>
        <p style="color: rgb(253, 170, 184);">Here you can manage your household members and their permissions.</p>

        <div id="members_list" style="background-color: lightblue; border-radius: 1cm; padding: 20px; flex: auto;">

            <!-- Greta -->
            <div class="members-list">
                <img src="GretaPopup.png" alt="Profilbild" class="profile-pic-small" style="margin-left: 110px;">
                <p>Greta</p>
                <button class="btn" onclick="togglePopup('1')">Edit Permissions</button>

                <div id="1" class="Popupmembers" style="display: none;">
                    <h2 style="background-color: rgb(167, 235, 235);">Gretas Popup</h2>
                    <div class="checkbox-div"></div>
                    <input class="checkbox" type="checkbox" name="allowance" value="lights" checked> Lights <br>
                    <input class="checkbox" type="checkbox" name="allowance" value="Thermostate" checked> Therm<br>
                </div>
            </div>

            <!-- Kashif -->
            <div class="members-list">
                <img src="KashifPopup.png" alt="Profilbild" class="profile-pic-small" style="margin-left: 110px;">
                <p>Kashif</p>
                <button class="btn" onclick="togglePopup('2')">Edit Permissions</button>

                <div id="2" class="Popupmembers" style="display: none;">
                    <h2 style="background-color: rgb(167, 235, 235);">Kashifs Popup</h2>
                    <div class="checkbox-div"></div>
                    <input class="checkbox" type="checkbox" name="allowance" value="lights" checked> Lights <br>
                    <input class="checkbox" type="checkbox" name="allowance" value="Thermostate" checked> Therm<br>
                </div>
            </div>

            <!-- Voldymir -->
            <div class="members-list">
                <img src="VovaPopup.png" alt="Profilbild" class="profile-pic-small" style="margin-left: 110px;">
                <p style="color: white;">Voldymir</p>
                <button class="btn" onclick="togglePopup('3')">Edit Permissions</button>

                <div id="3" class="Popupmembers" style="display: none;">
                    <h2 style="background-color: rgb(167, 235, 235);">Voldymir's Popup</h2>
                    <div class="checkbox-div"></div>
                    <input class="checkbox" type="checkbox" name="allowance" value="lights" checked> Lights <br>
                    <input class="checkbox" type="checkbox" name="allowance" value="Thermostate" checked> Therm<br>
                </div>
            </div>

            <!-- Alice -->
            <div class="members-list">
                <img src="AlicePopup.png" alt="Profilbild" class="profile-pic-small" style="margin-left: 110px;">
                <p>Alice</p>
                <button class="btn" onclick="togglePopup('4')">Edit Permissions</button>

                <div id="4" class="Popupmembers" style="display: none;">
                    <h2 style="background-color: rgb(167, 235, 235);">Alice' Popup</h2>
                    <div class="checkbox-div"></div>
                    <input class="checkbox" type="checkbox" name="allowance" value="lights" checked> Lights <br>
                    <input class="checkbox" type="checkbox" name="allowance" value="Thermostate" checked> Therm<br>
                </div>
            </div>

        </div>
    </div>
  </div>
</div>

    </body>

    <script>

        function togglePopup(memberId) {
            const popup = document.getElementById(memberId);
            const isOpen = popup.style.display === 'block';

          
            document.querySelectorAll('.Popupmembers').forEach(p => p.style.display = 'none');

            
            if (!isOpen) {
                popup.style.display = 'block';
                document.addEventListener('click', closePopup);
            }
        }

       // auto closes popup when clicking outside of it
        function closePopup(event) {
            const openPopup = document.querySelector('.Popupmembers[style*="display: block"]');
            if (openPopup && !openPopup.contains(event.target) && !event.target.classList.contains('btn')) {
                openPopup.style.display = 'none';
                document.removeEventListener('click', closePopup);
            }
        }
    </script>
</html>
